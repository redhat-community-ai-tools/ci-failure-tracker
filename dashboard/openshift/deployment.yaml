apiVersion: apps/v1
kind: Deployment
metadata:
  name: winc-dashboard
  labels:
    app: winc-dashboard
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"winc-dashboard:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"dashboard\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: winc-dashboard
  template:
    metadata:
      labels:
        app: winc-dashboard
    spec:
      containers:
      - name: dashboard
        image: image-registry.openshift-image-registry.svc:5000/winc-dashboard/winc-dashboard:latest
        workingDir: /app
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: REPORTPORTAL_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: reportportal-token
              key: token
              optional: true
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: dashboard-data
