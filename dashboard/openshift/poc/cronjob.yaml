apiVersion: batch/v1
kind: CronJob
metadata:
  name: winc-dashboard-poc-collector
  labels:
    app: winc-dashboard-poc
spec:
  # Run every 30 minutes to ensure we don't miss jobs (Prow API only keeps ~2 hours)
  schedule: "*/30 * * * *"

  # Keep last 3 successful and 1 failed job
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1

  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: winc-dashboard-poc-collector
        spec:
          restartPolicy: OnFailure
          containers:
          - name: collector
            image: curlimages/curl:latest
            command:
            - /bin/sh
            - -c
            - |
              echo "Triggering POC dashboard data collection..."
              curl -X POST http://winc-dashboard-poc:8080/api/trigger-collection \
                -H "Content-Type: application/json" \
                -d '{"days": 7}' \
                --max-time 1800
              echo "Collection triggered successfully"
