apiVersion: batch/v1
kind: CronJob
metadata:
  name: dashboard-collector
  labels:
    app: winc-dashboard
spec:
  # Daily at 9 AM UTC (adjust as needed)
  schedule: "0 9 * * *"

  # Keep history of last 3 successful and 3 failed jobs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3

  # Don't run if previous job is still running
  concurrencyPolicy: Forbid

  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: winc-dashboard
            component: data-collector
        spec:
          restartPolicy: OnFailure
          containers:
          - name: collector
            image: image-registry.openshift-image-registry.svc:5000/winc-dashboard/winc-dashboard:latest
            workingDir: /app
            command: ["python3"]
            args:
              - "dashboard.py"
              - "collect"
              - "--days"
              - "30"
            env:
            - name: REPORTPORTAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: reportportal-token
                  key: token
            volumeMounts:
            - name: data
              mountPath: /data
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          volumes:
          - name: data
            persistentVolumeClaim:
              claimName: dashboard-data
